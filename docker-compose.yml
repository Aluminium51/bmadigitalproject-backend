services:
  postgres:
    image: postgres:15-alpine
    container_name: bma_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: bma_db
    ports:
      - "5432:5432"
    volumes:
      - bma_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d bma_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: bma_backend
    restart: always
    ports:
      - "8081:8081"
    environment:
      - DATABASE_URL=postgresql://admin:password123@postgres:5432/bma_db
      - RESEND_API_KEY=${RESEND_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=8081
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8081/health",
        ]
      interval: 3s
      timeout: 3s
      retries: 3
      start_period: 5s
volumes:
  bma_pg_data:
